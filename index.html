<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日菜谱 - 美食推荐</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🍳 每日菜谱</h1>
      <p class="subtitle">今天吃什么？让菜谱来帮你决定</p>
      <a href="feast.html" class="feast-link">🎊 吃席菜单生成器</a>
      <div class="update-notification" id="updateNotification">
        <div class="notification-badge" id="notificationBadge">0</div>
        <button class="history-btn" id="historyBtn">📋 更新记录</button>
      </div>
    </header>

    <section class="daily-recommend">
      <h2>📅 今日推荐</h2>
      <p class="recommend-date" id="recommendDate"></p>
      <div class="recommend-grid" id="dailyRecommend"></div>
    </section>

    <div class="search-container">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索菜谱名称、食材..." autocomplete="off">
    </div>

    <nav class="category-nav">
      <button class="category-btn active" data-category="all">全部</button>
      <button class="category-btn" data-category="staple">主食</button>
      <button class="category-btn" data-category="vegetable">素菜</button>
      <button class="category-btn" data-category="meat">荤菜</button>
      <button class="category-btn" data-category="soup">汤</button>
      <button class="category-btn" data-category="snack">小吃</button>
      <button class="category-btn" data-category="dessert">甜点</button>
      <button class="category-btn" data-category="midnight">宵夜</button>
      <button class="category-btn" data-category="spice">🧂 香料</button>
    </nav>

    <section class="recipe-list" id="recipeList"></section>
  </div>

  <div class="modal-overlay" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📋 菜谱更新记录</h3>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <div class="modal-body" id="historyList"></div>
    </div>
  </div>

  <script src="recipes.js"></script>
  <script src="spices.js"></script>
  <script src="app.js"></script>
</body>
</html>
